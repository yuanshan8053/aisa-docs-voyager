name: Doc Reality Check

# Puts the auditor agent INSIDE the documentation development loop:
#   - on every docs PR  -> block merges that introduce drift
#   - every 6 hours      -> catch drift introduced by the upstream
#                           gateway auto-sync (skills/models change without
#                           a docs PR), and auto-open a fix issue
#
# This is the "AI agent runs the doc system automatically" piece: humans
# stop being the diff engine between prose and the live contract.

on:
  pull_request:
    paths:
      - "docs/**"
      - "guides/**"
      - ".well-known/**"
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  reality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Doc Reality Auditor
        id: audit
        run: |
          python -m aisa_doc_auditor.auditor \
            --json reports/audit.json \
            --md reports/audit.md \
            --ci || echo "had_blockers=1" >> "$GITHUB_OUTPUT"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doc-reality-report
          path: reports/

      # On a PR: post the report as a sticky comment so the author sees
      # exactly which prose claim no longer matches the live contract.
      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: doc-reality
          path: reports/audit.md

      # On the schedule: drift found with no PR in flight means the upstream
      # auto-sync changed reality. Open/refresh a tracking issue so the
      # localization + fix agents can pick it up.
      - name: Open drift issue (scheduled runs)
        if: github.event_name == 'schedule' && steps.audit.outputs.had_blockers == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('reports/audit.md', 'utf8');
            const title = 'Doc reality drift detected by scheduled audit';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'doc-drift',
            });
            if (existing.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Re-detected on ${new Date().toISOString()}:\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['doc-drift', 'automated'],
              });
            }

      - name: Fail the build on blockers
        if: steps.audit.outputs.had_blockers == '1'
        run: |
          echo "::error::Documentation drifted from the live contract. See the report."
          exit 1
