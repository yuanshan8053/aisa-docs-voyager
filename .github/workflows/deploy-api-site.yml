# 把成果落地页 + Scalar 双语 API 站点一并发布到 GitHub Pages。
# 站点结构:/ = 成果与历程落地页(site/index.html);/en/ /zh/ = 阶段五双语 API 站(ws-site/)。
#
# 触发:手动(workflow_dispatch),或推送到 main 且改动 site/、ws-site/、本文件时。
# Pages 已启用为 GitHub Actions 源(2026-06-26)。
#
# 站点地址(部署后):
#   https://<owner>.github.io/<repo>/        (成果落地页)
#   https://<owner>.github.io/<repo>/en/     (英文 API 站)
#   https://<owner>.github.io/<repo>/zh/     (中文 API 站)
#
# 为什么能用:落地页是纯静态 HTML(内联 CSS,无构建);Scalar standalone 从公共 jsDelivr
# 加载、spec 用相对 URL 拉取。GitHub Pages 是 http(s) 静态托管,相对 fetch 正常工作
# (这解决了本地 file:// 直开时的浏览器 CORS 限制)。

name: Deploy Site (landing + Scalar API)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "ws-site/**"
      - ".github/workflows/deploy-api-site.yml"

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只跑一个部署，新推送取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 发布三块,不带源码与中间产物:
      #   /            ← site/index.html(成果与历程落地页,带英/中 API 站入口)
      #   /en/ /zh/    ← ws-site/ 双语 Scalar API 站(各 30 份投影 spec + index.html)
      # 落地页用相对链接 ./en/ ./zh/ 指向同级双语站,放在站点根即生效。
      - name: Assemble site root
        run: |
          mkdir -p _site
          cp site/index.html _site/index.html
          cp -r ws-site/en _site/en
          cp -r ws-site/zh _site/zh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
